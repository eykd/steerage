[flake8]
exclude =
        .git
max-line-length = 140
ignore =
       W503, # line break occurred before a binary operator
       E203, # whitespace before ':'

[versioneer]
VCS = git
style = pep440
versionfile_source = src/steerage/_version.py
versionfile_build = src/steerage/_version.py
tag_prefix = ''
parentdir_prefix = ''
